services:
  front:
    build:
      context: .
      dockerfile: docker/node/Dockerfile
    container_name: ops-board-front
    volumes:
      - ./:/app
      - front_node_modules:/app/node_modules
      - front_next_cache:/app/.next
    environment:
      NODE_ENV: development
      HOST: 0.0.0.0
      PORT: "3000"
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
      # Reached from inside the container (Docker DNS on the shared proxy network).
      INTERNAL_API_URL: http://ops-board-nginx
      NEXT_PUBLIC_APP_URL: https://app.ops-board.dev.localhost
    expose:
      - "3000"
    networks:
      - default
      - proxy
    labels:
      - traefik.enable=true
      - traefik.docker.network=proxy
      - traefik.http.routers.next.rule=Host(`app.ops-board.dev.localhost`)
      - traefik.http.routers.next.entrypoints=websecure
      - traefik.http.routers.next.tls=true
      - traefik.http.services.next.loadbalancer.server.port=3000

volumes:
  front_node_modules:
  front_next_cache:

networks:
  proxy:
    external: true